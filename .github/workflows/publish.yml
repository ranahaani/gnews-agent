name: Upload Python Package

on:
  push:
    branches:
      - main
  workflow_dispatch:        # manual trigger for the first publish

jobs:
  pypi-publish:
    name: Publish release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gnews-agent
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if pyproject.toml version changed
        id: check
        run: |
          # workflow_dispatch always publishes (first-release escape hatch).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff HEAD~1 HEAD -- pyproject.toml | grep -E '^\+version' | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        if: steps.check.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        if: steps.check.outputs.changed == 'true'
        run: python -m build

      - name: Publish package distributions to PyPI
        if: steps.check.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Skip — version unchanged
        if: steps.check.outputs.changed == 'false'
        run: echo "pyproject.toml version not changed — skipping PyPI publish"
